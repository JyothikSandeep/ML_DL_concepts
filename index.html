<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- unordered list -->
    <p>Cofee</p>
    <p style="padding-left: 30px;"> - black hot drink</p>
    <ul style="list-style-type: none;">
        <li>soap</li>
        <li>pencil</li>
        <li>bag</li>
    </ul>

    <!-- ordered list -->

    <ol type="I">
         <li>soap</li>
         
        <li>pencil</li>
        <ul >
            <li>Apsara</li>
            <li>Nataraj</li>

         </ul>
        <li>bag</li>
    </ol>

    <!-- data lists -->

    <dl>
        <dt>Coffee</dt>
        <dd>- black hot drink</dd>
        <dt>Milk</dt>
        <dd>- white cold drink</dd>
    </dl>

</body>
</html>
